version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: flowdock-postgres
    environment:
      POSTGRES_DB: flowdock
      POSTGRES_USER: flowdock
      POSTGRES_PASSWORD: flowdock_dev_2024
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowdock"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
